{{ with index .Site.Data.conf }}
<a
	class="button is-primary1 mb-3"
	href="{{ .ltr_dmg }}"
    onclick="thanks(this)"
    download
>Long Term Version for macOS ({{ .ltrversion }} {{ .ltrnote }})</a>

<a
	class="button is-primary1 is-outlined mb-3"
	href="{{ .lr_dmg }}"
    onclick="thanks(this)"
    download
>{{ i18n "latestVersionForMacOS" }} ({{ .version }})</a>
<a
    class="button is-primary1 is-outlined mb-3"
    href="https://download.qgis.org/downloads/macos/qgis-macos-master.dmg"
    onclick="thanks(this)"
    download
>Nightly builds for macOS</a>

{{ end }}
